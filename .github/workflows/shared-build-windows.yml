##########################
#
# Microsoft Windows
# Windows x64 (MSVC)
#
##########################
name: "Windows Builds"

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string

env:
  BUILD_TYPE: RelWithDebInfo
  RELEASE_STAGE: ${{ vars.RELEASE_STAGE || 'unstable' }}

jobs:
  build:
    name: "Building for platform windows-x64"
    runs-on: "windows-latest"
    env:
        sdl2-branch: 'release-2.32.8'
        openal-soft-branch: '1.24.3'
        curl-version: '8_12_1'

    steps:
    ###
    # Packages
    ###

    - name: Install required packages
      run: |
        choco install winflexbison3 -y

    ###
    # SDL
    ###

    - name: Cache SDL2
      id: cache-sdl2
      uses: actions/cache@v4
      with:
        path: 'thirdparties/SDL2/install'
        key: ${{ runner.os }}-x64-sdl2-${{ env.sdl2-branch }}-v1

    - name: Checkout SDL2
      if: steps.cache-sdl2.outputs.cache-hit != 'true'
      uses: actions/checkout@v4
      with:
        repository: 'libsdl-org/SDL'
        path: 'thirdparties/SDL2'
        ref: '${{ env.sdl2-branch }}'

    - name: Configure and install SDL2
      if: steps.cache-sdl2.outputs.cache-hit != 'true'
      working-directory: ${{github.workspace}}/thirdparties/SDL2
      run: |
        cmake -B ./build `
          -A x64 `
          -DCMAKE_INSTALL_PREFIX='${{github.workspace}}/thirdparties/SDL2/install'
        cmake --build ./build --config Release --parallel
        cmake --install ./build --config Release

    ###
    # OpenAL
    ###

    - name: Cache OpenAL
      id: cache-openal-soft
      uses: actions/cache@v4
      with:
        path: 'thirdparties/soft-oal/install'
        key: ${{ runner.os }}-x64-openal-soft-${{ env.openal-soft-branch }}-v1

    - name: Checkout soft-oal
      if: steps.cache-openal-soft.outputs.cache-hit != 'true'
      uses: actions/checkout@v4
      with:
        repository: 'kcat/openal-soft'
        path: 'thirdparties/soft-oal'
        ref: '${{ env.openal-soft-branch }}'

    - name: Configure and install soft-oal
      if: steps.cache-openal-soft.outputs.cache-hit != 'true'
      working-directory: ${{github.workspace}}/thirdparties/soft-oal
      run: |
        cmake -B ./build `
          -A x64 `
          -DCMAKE_INSTALL_PREFIX='${{github.workspace}}/thirdparties/soft-oal/install' `
          -DCMAKE_VERBOSE_MAKEFILE=on
        cmake --build ./build --config Release --parallel
        cmake --install ./build --config Release

    ###
    # cURL
    ###

    - name: Cache cURL
      id: cache-curl
      uses: actions/cache@v4
      with:
        path: 'thirdparties/curl/install'
        key: ${{ runner.os }}-x64-curl-${{ env.curl-version }}-v1

    - name: Checkout cURL
      if: steps.cache-curl.outputs.cache-hit != 'true'
      uses: actions/checkout@v4
      with:
        repository: 'curl/curl'
        path: 'thirdparties/curl'
        ref: 'curl-${{ env.curl-version }}'

    - name: Configure and install curl
      if: steps.cache-curl.outputs.cache-hit != 'true'
      working-directory: ${{github.workspace}}/thirdparties/curl
      run: |
        cmake -B ./build `
          -A x64 `
          -DCMAKE_INSTALL_PREFIX='${{github.workspace}}/thirdparties/curl/install' `
          -DCURL_USE_LIBPSL=OFF `
          -DCURL_USE_WOLFSSL=OFF `
          -DCURL_USE_LIBSSH2=OFF `
          -DUSE_LIBIDN2=OFF `
          -DUSE_NGHTTP2=OFF `
          -DCURL_ENABLE_SSL=OFF `
          -DCURL_ZLIB="" `
          -DCURL_BROTLI="" `
          -DCURL_ZSTD=""
        cmake --build ./build --config Release --parallel
        cmake --install ./build --config Release

    ###
    # Project
    ###

    - uses: actions/checkout@v4
      with:
        path: 'source'

    - name: Configure CMake
      working-directory: ${{github.workspace}}
      run: |
        cmake -B ./build --log-level=VERBOSE `
          -A x64 `
          -DCMAKE_INSTALL_PREFIX='${{github.workspace}}/install' `
          -DCMAKE_VERBOSE_MAKEFILE=on `
          -DUSE_INTERNAL_SDL=OFF `
          -DSDL2_DIR='${{github.workspace}}/thirdparties/SDL2/install/cmake' `
          -DOPENAL_LIBRARY='${{github.workspace}}/thirdparties/soft-oal/install' `
          -DOPENAL_INCLUDE_DIR='${{github.workspace}}/thirdparties/soft-oal/install/include/AL' `
          -DCURL_ROOT='${{github.workspace}}/thirdparties/curl/install' `
          -DBUILD_RENDERER_GL2=OFF `
          -DGIT_REVISION_BUILD_NUMBER=${{ github.run_number }} `
          -DPRODUCT_VERSION_STAGE='${{ env.RELEASE_STAGE }}' `
          ./source

    - name: Build
      working-directory: ${{github.workspace}}
      run: |
        cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}} --parallel

    - name: Install
      working-directory: ${{github.workspace}}
      run: |
        cmake --install ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}
        # Assemble package
        New-Item -ItemType Directory -Force -Path '${{github.workspace}}/package'
        # Copy binaries and libraries
        if (Test-Path '${{github.workspace}}/install/bin') {
          Copy-Item -Recurse '${{github.workspace}}/install/bin/openmohaa/*' '${{github.workspace}}/package/'
        }
        if (Test-Path '${{github.workspace}}/install/lib') {
          Copy-Item -Recurse '${{github.workspace}}/install/lib/openmohaa/*' '${{github.workspace}}/package/'
        }
        # Copy third-party DLLs
        $dllSearchPaths = @(
          '${{github.workspace}}/thirdparties/SDL2/install',
          '${{github.workspace}}/thirdparties/soft-oal/install',
          '${{github.workspace}}/thirdparties/curl/install'
        )
        foreach ($searchPath in $dllSearchPaths) {
          Get-ChildItem -Path $searchPath -Recurse -Filter '*.dll' | ForEach-Object {
            Copy-Item $_.FullName '${{github.workspace}}/package/'
          }
        }

    ###
    # Artifacts
    ###

    - uses: actions/upload-artifact@v4
      with:
        name: out-windows-x64
        if-no-files-found: error
        compression-level: 9
        path:
          ${{github.workspace}}/package
